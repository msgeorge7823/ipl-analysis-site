# Netlify configuration for the IPL Analytics site.
# Source files (src/, raw-data/, scripts/, etc.) live in the repo for
# completeness but are never exposed at the deploy URL — Netlify only
# publishes whatever ends up in `dist/` after `npm run build`.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# SPA fallback: serve index.html for any unknown path so react-router
# can resolve client-side routes (/players/:id, /matches/:id, etc.).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Cache headers ──
# Vite fingerprints files under /assets/* (e.g. index-abc123.js), so they
# can safely be cached for a year — content will never change at the same
# URL. Other static assets are not fingerprinted, so they get shorter
# cache lifetimes with revalidation.

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/data/*"
  [headers.values]
    # Data shards regenerate on every deploy. 1-hour cache + must-revalidate
    # keeps them fresh without re-downloading on every navigation.
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/photos/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/teams/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/favicon.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800"
